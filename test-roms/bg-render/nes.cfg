MEMORY {
    ZP:       start = $0000, size = $0100, type = rw;
    RAM:      start = $0200, size = $0600, type = rw;

    HDR:      start = $0000, size = $0010, type = ro, file = %O, fill = yes;
    PRG:      start = $8000, size = $7FFA, type = ro, file = %O, fill = yes;
    VECTORS:  start = $FFFA, size = $0006, type = ro, file = %O, fill = yes;
    CHR:      start = $0000, size = $2000, type = ro, file = %O, fill = yes;
}

SEGMENTS {
    HEADER:   load = HDR,     type = ro;
    CODE:     load = PRG,     type = ro, align = $100;
    RODATA:   load = PRG,     type = ro;
    BSS:      load = RAM,     type = bss;
    VECTORS:  load = VECTORS, type = ro;
    CHR:      load = CHR,     type = ro;
}
